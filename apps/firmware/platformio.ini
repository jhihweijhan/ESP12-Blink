; PlatformIO Project Configuration File
;
; 「暗大浪事 V1.9」ESP12F 板 + 方形 TFT 螢幕
;
; 腳位配置：
; CS=GPIO16, DC=GPIO0, RST=GPIO4, BL=GPIO5(LOW=開)
; MOSI=GPIO13, SCLK=GPIO14

[platformio]
default_envs = esp12e_wifi

[env:esp12e_wifi]
platform = espressif8266
board = esp12e
framework = arduino
monitor_speed = 115200
upload_port = /dev/ttyUSB0
board_build.filesystem = littlefs
test_ignore = test_connection_policy

build_flags =
    -DEMC_ESP8266_MULTITHREADING=1
    -DEMC_MIN_FREE_MEMORY=4096

lib_deps =
    bblanchon/ArduinoJson@^7.0.0
    ricmoo/QRCode@^0.0.1
    https://github.com/me-no-dev/ESPAsyncTCP.git
    https://github.com/me-no-dev/ESPAsyncWebServer.git
    bertmelis/espMqttClient@^1.7.0

[env:native]
platform = native
test_framework = unity
test_build_src = no
test_filter = test_connection_policy
build_flags =
    -std=gnu++17
